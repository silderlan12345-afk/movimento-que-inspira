<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Movimento que Inspira</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- IMAGEM TOPO -->
<section class="banner">
<img src="projeto.jpg" alt="Projeto">
</section>

<header>
<h1>🏆 Movimento que Inspira</h1>
<h3>Movimente-se, cuide da sua saúde e inspire seus colegas!</h3>
<h3>EMTI Joaquim Napoleão Pinheiro</h3>
<p>Projeto idealizado pelo Professor Wellyngton Pinheiro</p>
</header>

<h2>🥇 Ranking Geral</h2>
<div id="ranking"></div>

<h2>🏫 Ranking por Turma</h2>
<select id="filtroTurma" onchange="filtrarTurma()">
<option value="todas">Todas</option>
<option value="9A">9º A</option>
<option value="9B">9º B</option>
</select>

<div id="rankingTurma"></div>

<h2>📊 Gráfico</h2>
<canvas id="grafico"></canvas>

<h2>📅 Desafio da Semana</h2>
<p id="textoDesafio">Nenhum desafio</p>

<h2>🔐 Professor</h2>
<input type="password" id="senha">
<button onclick="login()">Entrar</button>

<div id="painel" style="display:none;">

<input id="nome" placeholder="Nome">
<input id="pontos" type="number" placeholder="Pontos">

<select id="turma">
<option value="9A">9A</option>
<option value="9B">9B</option>
</select>

<!-- FOTO -->
<input id="foto" placeholder="Link da imagem (imgur)">

<button onclick="adicionarAluno()">Adicionar</button>

<h3>Desafio</h3>
<input id="desafioInput">
<button onclick="criarDesafio()">Salvar</button>

</div>

<script src="script.js"></script>

</body>
</html>
